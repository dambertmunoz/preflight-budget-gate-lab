  <rect x="683" y="612" width="220" height="98" rx="28" fill="rgba(14,11,38,.9)" stroke="url(#cyanViolet)" stroke-width="4" filter="url(#glow)"/>
  <text x="736" y="653" class="nodeText">Gate</text>
  <text x="717" y="684" class="micro">side_effect_allowed?</text>

  <path class="line" d="M903 662 C945 662, 965 662, 1005 662"/>
  <rect x="1005" y="619" width="72" height="86" rx="18" fill="rgba(125,211,252,.12)" stroke="#7DD3FC" stroke-width="3"/>
  <text x="1023" y="672" class="nodeText">✓</text>
  <text x="967" y="746" class="micro">Execute</text>

  <path class="deny" d="M792 710 C792 760, 692 792, 595 792"/>
  <rect x="392" y="746" width="205" height="82" rx="22" fill="rgba(167,139,250,.12)" stroke="#A78BFA" stroke-width="3"/>
  <text x="428" y="797" class="nodeText">Manual Review</text>

  <path class="deny" d="M683 662 C605 662, 560 625, 515 584"/>
  <rect x="410" y="538" width="115" height="70" rx="20" fill="rgba(167,139,250,.12)" stroke="#A78BFA" stroke-width="3"/>
  <text x="446" y="582" class="nodeText">Deny</text>

  <rect x="135" y="922" width="930" height="132" rx="30" fill="rgba(15,23,42,.72)" stroke="rgba(248,250,252,.16)" stroke-width="2"/>
  <text x="170" y="973" class="small">Audit trace</text>
  <text x="170" y="1018" class="micro">HELD → COMMITTED / RELEASED · stable DecisionCode · no side effect before admission</text>

  <text x="80" y="1128" class="small">dambertmunoz.com · linkedin.com/in/dambert-m-4b772397</text>
</svg>